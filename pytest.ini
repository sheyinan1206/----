[pytest]
addopts = -v -v -v -s --html=report.html --self-contained-html --driver=edge --alluredir=temps --clean-alluredir

markers = 
    api: 接口用例
    web: UI用例
    ut: 单元测试
    e2e

log_file = ./logs/pytest.log
log_file_level = info
log_file_format = %(levelname)-8s %(asctime)s [%(name)s:%(lineno)s] : %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

result_log_enable = 1
result_log_separator = 1
result_log_level_separator = warning
result_log_level_verbose = info

#日志，截图，其他信息
selenium_capture_debug = always
[mysql]